llm:
  # Supported providers: ollama, openai, anthropic, local
  provider: "ollama"

  ollama:
    model: "llama3.2"
    base_url: "http://localhost:11434"
    temperature: 0.7
    max_tokens: 2048

  openai:
    model: "gpt-4o"
    api_key: ""            # Or set OPENAI_API_KEY env var
    temperature: 0.7
    max_tokens: 2048

  anthropic:
    model: "claude-sonnet-4-20250514"
    api_key: ""            # Or set ANTHROPIC_API_KEY env var
    temperature: 0.7
    max_tokens: 2048

  local:
    model_path: ""
    model_type: "mistral"
    gpu_layers: 0
    temperature: 0.7
    max_tokens: 2048

voice:
  stt_engine: "speech_recognition"  # speech_recognition, whisper
  tts_engine: "pyttsx3"            # pyttsx3, edge_tts
  language: "en-US"
  push_to_talk_key: "space"

keyboard:
  enabled: true
  typing_speed: 0.05
